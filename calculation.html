<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Calculator</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #558abb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Calculator Container */
        .calculator {
            background-color: #f4f8fb;
            width: 380px;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        /* Display Screen */
        .display {
            background-color: #cbe0f4;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100px;
        }

        .history {
            color: #4a78a6;
            font-size: 16px;
            font-weight: 500;
            min-height: 20px;
            letter-spacing: 1px;
        }

        .result {
            color: #173d61;
            font-size: 42px;
            font-weight: 700;
            word-wrap: break-word;
            margin-top: 10px;
        }

        /* Buttons Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        /* Generic Button Styling */
        button {
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            padding: 18px 0;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Number Buttons (Light Blue) */
        .btn-number {
            background-color: #d8e9f9;
            color: #1a2f4c;
        }

        .btn-number:hover {
            background-color: #c4def3;
        }

        /* Action/Operator Buttons (Medium Blue) */
        .btn-action {
            background-color: #a6cdf1;
            color: #14508e;
            font-size: 16px;
        }

        .btn-action:hover {
            background-color: #8bbceb;
        }

        /* Special Operations (+, -, x, ÷) */
        .btn-op {
            background-color: #a6cdf1;
            color: #14508e;
            font-size: 22px;
        }

        .btn-op:hover {
            background-color: #8bbceb;
        }

        /* Enter Button (Dark Blue, spans 2 columns) */
        .btn-enter {
            background-color: #4d8bcd;
            color: #ffffff;
            grid-column: span 2;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .btn-enter:hover {
            background-color: #3b76b4;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display">
            <div class="history" id="history"></div>
            <div class="result" id="result">0</div>
        </div>
        
        <div class="buttons">
            <button class="btn-action" onclick="appendValue('(')">(</button>
            <button class="btn-action" onclick="appendValue(')')">)</button>
            <button class="btn-action" onclick="useAns()">ans</button>
            <button class="btn-action" onclick="deleteLast()">del</button>
            <button class="btn-action" onclick="clearDisplay()">clear</button>
            
            <button class="btn-number" onclick="appendValue('7')">7</button>
            <button class="btn-number" onclick="appendValue('8')">8</button>
            <button class="btn-number" onclick="appendValue('9')">9</button>
            <button class="btn-action" onclick="appendValue('%')">%</button>
            <button class="btn-action" onclick="calculateSquareRoot()">√</button>
            
            <button class="btn-number" onclick="appendValue('4')">4</button>
            <button class="btn-number" onclick="appendValue('5')">5</button>
            <button class="btn-number" onclick="appendValue('6')">6</button>
            <button class="btn-op" onclick="appendValue(' x ')">x</button>
            <button class="btn-op" onclick="appendValue(' ÷ ')">÷</button>
            
            <button class="btn-number" onclick="appendValue('1')">1</button>
            <button class="btn-number" onclick="appendValue('2')">2</button>
            <button class="btn-number" onclick="appendValue('3')">3</button>
            <button class="btn-op" onclick="appendValue(' + ')">+</button>
            <button class="btn-op" onclick="appendValue(' - ')">-</button>
            
            <button class="btn-action" onclick="appendValue('.')">.</button>
            <button class="btn-number" onclick="appendValue('0')">0</button>
            <button class="btn-action" onclick="toggleSign()">±</button>
            <button class="btn-enter" onclick="calculateResult()">ENTER</button>
        </div>
    </div>

    <script>
        const historyDisplay = document.getElementById('history');
        const resultDisplay = document.getElementById('result');
        
        let currentExpression = '';
        let lastAnswer = '';

        // Update the display outputs
        function updateDisplay(value, isResult = false) {
            if (isResult) {
                resultDisplay.innerText = value;
            } else {
                historyDisplay.innerText = value;
                // Keep result display echoing the expression as you type, unless empty
                resultDisplay.innerText = value === '' ? '0' : value;
            }
        }

        // Add a number or operator to the expression
        function appendValue(val) {
            // Prevent initial operators or multiple dots in a confusing way
            if (currentExpression === '' && (val === ' x ' || val === ' ÷ ' || val === '%')) return;
            
            currentExpression += val;
            updateDisplay(currentExpression);
        }

        // Clear everything
        function clearDisplay() {
            currentExpression = '';
            historyDisplay.innerText = '';
            resultDisplay.innerText = '0';
        }

        // Delete the last character
        function deleteLast() {
            // Trim to handle spaces around operators properly
            currentExpression = currentExpression.trimEnd();
            currentExpression = currentExpression.slice(0, -1);
            updateDisplay(currentExpression);
        }

        // Use the previous answer
        function useAns() {
            if (lastAnswer !== '') {
                appendValue(lastAnswer);
            }
        }

        // Toggle sign (+/-)
        function toggleSign() {
            if (currentExpression === '') return;
            
            // Safe evaluation of current expression, then multiply by -1
            try {
                let evalString = sanitizeExpression(currentExpression);
                let evaluated = eval(evalString);
                let toggled = evaluated * -1;
                
                currentExpression = toggled.toString();
                updateDisplay(currentExpression);
            } catch (error) {
                resultDisplay.innerText = 'Error';
            }
        }

        // Calculate Square Root
        function calculateSquareRoot() {
            if (currentExpression === '') return;
            
            try {
                let evalString = sanitizeExpression(currentExpression);
                let evaluated = eval(evalString);
                
                if (evaluated < 0) {
                    resultDisplay.innerText = 'Error';
                    return;
                }
                
                let sqrtResult = Math.sqrt(evaluated);
                // Clean up long decimals
                sqrtResult = Math.round(sqrtResult * 100000000) / 100000000; 
                
                historyDisplay.innerText = `√(${currentExpression})`;
                resultDisplay.innerText = sqrtResult;
                
                currentExpression = sqrtResult.toString();
                lastAnswer = currentExpression;
            } catch (error) {
                resultDisplay.innerText = 'Error';
            }
        }

        // Format operators so JavaScript can evaluate them safely
        function sanitizeExpression(expr) {
            return expr.replace(/x/g, '*')
                       .replace(/÷/g, '/')
                       .replace(/%/g, '/100');
        }

        // Calculate the final result on ENTER
        function calculateResult() {
            if (currentExpression === '') return;
            
            try {
                let evalString = sanitizeExpression(currentExpression);
                
                // Using the Function constructor is slightly safer than raw eval()
                let result = new Function('return ' + evalString)();
                
                // Format decimal points to avoid floating point anomalies (e.g. 0.1 + 0.2 = 0.30000000000000004)
                result = Math.round(result * 100000000) / 100000000;

                historyDisplay.innerText = currentExpression;
                resultDisplay.innerText = result;
                
                lastAnswer = result.toString();
                currentExpression = result.toString(); // Allows continuing calculations with the new result
            } catch (error) {
                resultDisplay.innerText = 'Error';
            }
        }
    </script>
</body>
</html>
